{% extends 'data_entry/base.html' %}
{% block title %}Daftar - ProManage{% endblock %}
{% block content %}
<section class="section auth-section">
  <div class="auth-card">
    <h1>Daftar Akun</h1>
    <p class="muted">Buat akun baru untuk mulai mengelola proyek.</p>
    <form method="post" class="form-stack">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <label>Username {{ form.username }}</label>
      <label>Email {{ form.email }}</label>
      <label>NIM {{ form.nim }}</label>
      <label>Password {{ form.password1 }}</label>
      <label>Konfirmasi Password {{ form.password2 }}</label>
      <button class="btn btn-primary" type="submit">Buat Akun</button>
    </form>
    <p class="muted">Sudah punya akun? <a href="{% url 'data_entry:login' %}">Masuk</a></p>
  </div>
</section>
{% endblock %}
