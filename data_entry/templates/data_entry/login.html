{% extends 'data_entry/base.html' %}
{% block title %}Masuk - ProManage{% endblock %}
{% block content %}
<section class="section auth-section">
  <div class="auth-card">
    <h1>Masuk</h1>
    <p class="muted">Masuk untuk mengelola proyek Anda.</p>
    <form method="post" class="form-stack">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <label>Username
        {{ form.username }}
      </label>
      <label>Password
        {{ form.password }}
      </label>
      <button class="btn btn-primary" type="submit">Masuk</button>
    </form>
    <p class="muted">Belum punya akun? <a href="{% url 'data_entry:register' %}">Daftar</a></p>
  </div>
</section>
{% endblock %}
